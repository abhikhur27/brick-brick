<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrickBrick | Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="reset-password.css">
</head>
<body>
  <div class="reset-shell">
    <div class="reset-card">
      <div class="reset-brand">BRICKBRICK</div>
      <div class="reset-label" id="resetPortalLabel">Secure Access</div>
      <h1 class="reset-title" id="resetTitle">Reset Password</h1>
      <p class="reset-copy" id="resetCopy">Verifying your reset link...</p>
      <div class="reset-status" id="resetStatus"></div>

      <form class="reset-form" id="resetForm" novalidate style="display:none">
        <label class="reset-field">
          New Password
          <input class="reset-input" type="password" id="newPassword" autocomplete="new-password" placeholder="At least 8 characters" required>
        </label>
        <label class="reset-field">
          Confirm Password
          <input class="reset-input" type="password" id="confirmPassword" autocomplete="new-password" placeholder="Re-enter password" required>
        </label>
        <button class="reset-btn" id="resetSubmitBtn" type="submit">Save New Password</button>
      </form>

      <a class="reset-return" id="resetReturnLink" href="/portal.html">Back to Team Workspace</a>
    </div>
  </div>

  <script src="reset-password.js?v=20260311a"></script>
</body>
</html>
